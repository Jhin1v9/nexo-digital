version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nexo-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: nexo123
      POSTGRES_DB: nexodb
    ports:
      - "5432:5432"
    volumes:
      - nexo-pg-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo -d nexodb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  nexo-pg-data:
