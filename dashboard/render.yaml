services:
  - type: web
    name: nexo-dashboard-pro
    runtime: node
    plan: free
    buildCommand: npm install && cd backend && npm install && cd .. && npm run build
    startCommand: cd backend && NODE_PATH=../node_modules:node_modules node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BIND_IP
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: b2b5540e2058220d83b58c1cc6fb62383c58fdc4363c87fcc6db6456647b6fee
        # ⚠️ TROCAR IMEDIATAMENTE pelo Render Dashboard: https://dashboard.render.com/web/srv-d85gqtrbc2fs73bq95bg
      - key: ROOT_DIR
        value: /opt/render/project/src
      - key: DATABASE_URL
        sync: false  # Set this in Render dashboard after creating Neon DB
      - key: KIMI_BRIDGE_URL
        sync: false  # Set after creating Cloudflare Tunnel: https://your-tunnel.trycloudflare.com
      - key: KIMI_BRIDGE_API_KEY
        generateValue: true  # Auto-generated API key for bridge API auth
      - key: AUTO_START_TELEGRAM_BOT
        value: 'false'  # Bot roda localmente via luna-local-mode.sh
