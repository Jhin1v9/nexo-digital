<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="lunaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0E6FF"/>
      <stop offset="70%" stop-color="#E0D4F7"/>
      <stop offset="100%" stop-color="#C9B8E8"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glow de fundo -->
  <circle cx="100" cy="100" r="90" fill="url(#lunaGlow)" opacity="0.3">
    <animate attributeName="r" values="85;95;85" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.35;0.2" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- Lua corpo -->
  <g id="luna-body">
    <path d="M100 15 A 85 85 0 1 0 100 185 A 65 65 0 1 1 100 15" fill="#F5F0FF" stroke="#C9A227" stroke-width="2.5" filter="url(#softGlow)"/>
    <!-- Detalhes da lua -->
    <circle cx="70" cy="70" r="8" fill="#E8DFF5" opacity="0.5"/>
    <circle cx="130" cy="120" r="5" fill="#E8DFF5" opacity="0.4"/>
    <circle cx="60" cy="140" r="6" fill="#E8DFF5" opacity="0.3"/>
  </g>

  <!-- Rosto -->
  <g id="face">
    <!-- Olho esquerdo -->
    <g id="eye-left" transform="translate(80, 85)">
      <ellipse cx="0" cy="0" rx="9" ry="11" fill="#2D2D44"/>
      <circle class="pupil" cx="2" cy="-3" r="3.5" fill="white"/>
      <circle cx="-1" cy="3" r="2" fill="#2D2D44" opacity="0.3"/>
    </g>
    <!-- Olho direito -->
    <g id="eye-right" transform="translate(120, 85)">
      <ellipse cx="0" cy="0" rx="9" ry="11" fill="#2D2D44"/>
      <circle class="pupil" cx="2" cy="-3" r="3.5" fill="white"/>
      <circle cx="-1" cy="3" r="2" fill="#2D2D44" opacity="0.3"/>
    </g>

    <!-- Boca (smile padrão) -->
    <path id="mouth" d="M92 112 Q 100 122 108 112" fill="none" stroke="#2D2D44" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Bochechas -->
    <circle cx="68" cy="108" r="7" fill="#FFB6C1" opacity="0.5"/>
    <circle cx="132" cy="108" r="7" fill="#FFB6C1" opacity="0.5"/>

    <!-- Cílios -->
    <path d="M72 78 Q 80 73 88 78" fill="none" stroke="#2D2D44" stroke-width="1.5"/>
    <path d="M112 78 Q 120 73 128 78" fill="none" stroke="#2D2D44" stroke-width="1.5"/>
  </g>

  <!-- Acessórios (opcional por estado) -->
  <g id="accessories" opacity="0">
    <!-- Óculos de nerd -->
    <g id="glasses">
      <circle cx="80" cy="85" r="14" fill="none" stroke="#4A90D9" stroke-width="2"/>
      <circle cx="120" cy="85" r="14" fill="none" stroke="#4A90D9" stroke-width="2"/>
      <line x1="94" y1="85" x2="106" y2="85" stroke="#4A90D9" stroke-width="2"/>
    </g>
    <!-- Zzz -->
    <g id="zzz" opacity="0">
      <text x="140" y="60" font-family="monospace" font-size="14" fill="#8B7EC8">Z</text>
      <text x="150" y="50" font-family="monospace" font-size="10" fill="#8B7EC8">z</text>
      <text x="158" y="42" font-family="monospace" font-size="8" fill="#8B7EC8">z</text>
    </g>
    <!-- Lâmpada ideia -->
    <g id="bulb" opacity="0">
      <path d="M145 45 Q 145 35 150 30 Q 155 25 160 30 Q 165 35 165 45 Q 165 50 160 52 L 160 58 L 150 58 L 150 52 Q 145 50 145 45" fill="#FFD700" opacity="0.8"/>
      <line x1="152" y1="58" x2="152" y2="62" stroke="#FFD700" stroke-width="2"/>
      <line x1="158" y1="58" x2="158" y2="62" stroke="#FFD700" stroke-width="2"/>
    </g>
    <!-- Teclado -->
    <g id="keyboard" opacity="0">
      <rect x="60" y="165" width="80" height="20" rx="3" fill="#2D2D44" opacity="0.8"/>
      <line x1="70" y1="172" x2="130" y2="172" stroke="#C9A227" stroke-width="1" opacity="0.6"/>
      <line x1="70" y1="178" x2="120" y2="178" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    </g>
  </g>

  <!-- Estrelas -->
  <g id="stars">
    <circle cx="25" cy="45" r="1.5" fill="#C9A227" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="165" cy="35" r="1" fill="#C9A227" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="175" cy="145" r="1.5" fill="#C9A227" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="155" r="1" fill="#C9A227" opacity="0.5">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>