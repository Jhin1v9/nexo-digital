<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Lua crescente -->
  <path d="M100 20 A 80 80 0 1 0 100 180 A 60 60 0 1 1 100 20" fill="#F0E6FF" stroke="#C9A227" stroke-width="3"/>
  <!-- Rosto -->
  <g id="face">
    <!-- Olho esquerdo -->
    <ellipse cx="85" cy="90" rx="8" ry="10" fill="#2D2D44"/>
    <circle cx="87" cy="87" r="3" fill="white"/>
    <!-- Olho direito -->
    <ellipse cx="115" cy="90" rx="8" ry="10" fill="#2D2D44"/>
    <circle cx="117" cy="87" r="3" fill="white"/>
    <!-- Boca -->
    <path d="M92 110 Q 100 118 108 110" fill="none" stroke="#2D2D44" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Bochechas -->
    <circle cx="75" cy="105" r="6" fill="#FFB6C1" opacity="0.6"/>
    <circle cx="125" cy="105" r="6" fill="#FFB6C1" opacity="0.6"/>
  </g>
  <!-- Estrelas decorativas -->
  <circle cx="30" cy="50" r="2" fill="#C9A227" opacity="0.8"/>
  <circle cx="160" cy="40" r="1.5" fill="#C9A227" opacity="0.6"/>
  <circle cx="170" cy="140" r="2" fill="#C9A227" opacity="0.7"/>
</svg>
